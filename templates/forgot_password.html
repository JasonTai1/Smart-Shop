{% extends "auth_base.html" %}
{% block title %} forgot password {% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center;
            justify-content:center; padding:40px 20px;">
<div style="width:100%; max-width:420px; background:white;
            padding:40px; border-radius:16px;
            box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center;">

    <!-- Icon  -->
    <div style="width:70px; height:70px; background:#fff5f5; border-radius:50%;
                display:flex; align-items:center; justify-content:center;
                margin:0 auto 20px; font-size:32px;">
        🔑
    </div>

    <h2 style="color:#800000; margin-bottom:8px;">Forgot Password </h2>
    <p style="color:#888; font-size:14px; margin-bottom:25px;">
        Enter your email to receive a reset OTP.
    </p>

    {% if error %}
    <div style="color:red; background:#fff0f0; padding:12px; border-radius:8px;
                margin-bottom:15px; font-size:14px; text-align:left;">
        ❌ {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <label style="display:block; font-size:13px; color:#555;
                      font-weight:600; margin-bottom:5px; text-align:left;">
            Email 
        </label>
        <input type="email" name="email"
               placeholder="your@email.com" required
               style="width:100%; padding:12px 14px; border:1px solid #ddd;
                      border-radius:8px; font-size:14px; margin-bottom:16px;
                      box-sizing:border-box; outline:none; text-align:left;">

        <button type="submit"
                style="width:100%; padding:13px; background:#800000;
                       color:white; border:none; border-radius:8px;
                       font-size:15px; font-weight:bold; cursor:pointer;">
              Send OTP 
        </button>
    </form>

    <a href="/login"
       style="display:block; margin-top:16px; color:#888;
              font-size:13px; text-decoration:none;">
           Back to Login 
    </a>

</div>
</div>
{% endblock %}
