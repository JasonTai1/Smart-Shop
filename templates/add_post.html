{% extends "base.html" %}
{% block content %}

<div style="max-width: 600px; margin: 40px auto; padding: 30px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    
    <h2 style="margin-bottom: 24px; color: #222; font-size: 24px; font-weight: 600; text-align: center;">Create Forum Post</h2>

    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        
        <!-- 标题输入框 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 14px; font-weight: 500; color: #800000;">Post Title</label>
            <input type="text" name="title" placeholder="What's on your mind?" required
                   style="width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s;"
                   onfocus="this.style.borderColor='#333'" onblur="this.style.borderColor='#ddd'">
        </div>

        <!-- 内容输入框 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 14px; font-weight: 500; color: #800000;">Content</label>
            <textarea name="content" placeholder="Share your experiences or ask questions..." rows="6" required
                      style="width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; resize: vertical; transition: border-color 0.2s;"
                      onfocus="this.style.borderColor='#333'" onblur="this.style.borderColor='#ddd'"></textarea>
        </div>

        <!-- 提交按钮 -->
        <button type="submit" 
                style="width: 100%; margin-top: 10px; padding: 14px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
                onmouseover="this.style.background='#444'" onmouseout="this.style.background='#222'">
            Create Post
        </button>

    </form>
</div>

{% endblock %}
