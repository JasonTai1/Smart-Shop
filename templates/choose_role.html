{% extends "base.html" %}
{% block title %}Choose Role{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center;
            justify-content:center; padding:40px 20px;">
<div style="width:100%; max-width:420px; background:white;
            padding:40px; border-radius:16px;
            box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center;">

    <h2 style="color:#800000; margin-bottom:8px;">Login As...</h2>
    <p style="color:#888; font-size:14px; margin-bottom:25px;">
        Your account has both roles. Please choose one.
    </p>

    <form method="POST">
        <button type="submit" name="role" value="buyer"
                style="width:100%; padding:20px; margin-bottom:12px;
                       border:2px solid #ddd; border-radius:12px;
                       background:white; cursor:pointer; text-align:left;
                       transition:all 0.2s;"
                onmouseover="this.style.borderColor='#800000';this.style.background='#fff5f5'"
                onmouseout="this.style.borderColor='#ddd';this.style.background='white'">
            <div style="font-size:30px;">🛒</div>
            <div style="font-size:16px; font-weight:bold; color:#333; margin-top:5px;">Buyer</div>
            <div style="font-size:13px; color:#888; margin-top:4px;">Browse and purchase products</div>
        </button>

        <button type="submit" name="role" value="seller"
                style="width:100%; padding:20px;
                       border:2px solid #ddd; border-radius:12px;
                       background:white; cursor:pointer; text-align:left;
                       transition:all 0.2s;"
                onmouseover="this.style.borderColor='#800000';this.style.background='#fff5f5'"
                onmouseout="this.style.borderColor='#ddd';this.style.background='white'">
            <div style="font-size:30px;">🏪</div>
            <div style="font-size:16px; font-weight:bold; color:#333; margin-top:5px;">Seller</div>
            <div style="font-size:13px; color:#888; margin-top:4px;">Manage your shop and products</div>
        </button>
    </form>

    <a href="/logout" style="display:block; margin-top:20px; color:#888; font-size:13px;">
        ← Back to Login
    </a>
</div>
</div>
{% endblock %}
