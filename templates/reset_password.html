{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center;
            justify-content:center; padding:40px 20px;">
<div style="width:100%; max-width:420px; background:white;
            padding:40px; border-radius:16px;
            box-shadow:0 4px 24px rgba(0,0,0,0.08);">

    <!-- Icon -->
    <div style="text-align:center;">
        <div style="width:70px; height:70px; background:#fff5f5;
                    border-radius:50%; display:flex; align-items:center;
                    justify-content:center; margin:0 auto 20px; font-size:32px;">
            🔒
        </div>
        <h2 style="color:#800000; margin-bottom:5px;">Reset Password</h2>
        <p style="color:#888; font-size:13px; margin-bottom:25px;">
            For account: {{ email }}
        </p>
    </div>

    {% if error %}
    <div style="color:red; background:#fff0f0; padding:12px; border-radius:8px;
                margin-bottom:15px; font-size:14px;">
        ❌ {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <label style="display:block; font-size:13px; color:#555;
                      font-weight:600; margin-bottom:5px;">
            New Password  <span style="color:red;">*</span>
        </label>
        <input type="password" name="new_password"
               placeholder="Min 6 characters " required
               id="newPass"
               style="width:100%; padding:12px 14px; border:1px solid #ddd;
                      border-radius:8px; font-size:14px; margin-bottom:16px;
                      box-sizing:border-box; outline:none;">

        <label style="display:block; font-size:13px; color:#555;
                      font-weight:600; margin-bottom:5px;">
            Confirm New Password  <span style="color:red;">*</span>
        </label>
        <input type="password" name="confirm_password"
               placeholder="Repeat new password " required
               id="confirmPass"
               style="width:100%; padding:12px 14px; border:1px solid #ddd;
                      border-radius:8px; font-size:14px; margin-bottom:8px;
                      box-sizing:border-box; outline:none;">

        <!-- Password match indicator -->
        <div id="matchMsg" style="font-size:12px; margin-bottom:16px; height:16px;"></div>

        <!-- Password strength  -->
        <div style="margin-bottom:20px;">
            <div style="font-size:12px; color:#888; margin-bottom:5px;">
                Password strength :
            </div>
            <div style="background:#f0f0f0; border-radius:4px; height:6px; overflow:hidden;">
                <div id="strengthBar"
                     style="height:100%; width:0%; background:#800000;
                            transition:all 0.3s; border-radius:4px;">
                </div>
            </div>
            <div id="strengthText"
                 style="font-size:11px; color:#888; margin-top:3px;"></div>
        </div>

        <button type="submit"
                style="width:100%; padding:13px; background:#800000;
                       color:white; border:none; border-radius:8px;
                       font-size:15px; font-weight:bold; cursor:pointer;">
             Reset Password 
        </button>

    </form>

</div>
</div>

<script>
// Check password match 
document.getElementById('confirmPass').addEventListener('input', function() {
    const newPass     = document.getElementById('newPass').value;
    const confirmPass = this.value;
    const msg         = document.getElementById('matchMsg');

    if (confirmPass === '') {
        msg.textContent = '';
    } else if (newPass === confirmPass) {
        msg.textContent = ' Passwords match! ';
        msg.style.color = 'green';
    } else {
        msg.textContent = ' Passwords do not match ';
        msg.style.color = 'red';
    }
});

// Password strength checker 
document.getElementById('newPass').addEventListener('input', function() {
    const pass     = this.value;
    const bar      = document.getElementById('strengthBar');
    const text     = document.getElementById('strengthText');

    let strength = 0;
    let label    = '';
    let color    = '';

    if (pass.length >= 6)  strength++;
    if (pass.length >= 10) strength++;
    if (/[A-Z]/.test(pass)) strength++;
    // /[A-Z]/ = checks if has uppercase letter
    if (/[0-9]/.test(pass)) strength++;
    // /[0-9]/ = checks if has number
    if (/[^A-Za-z0-9]/.test(pass)) strength++;
    // /[^A-Za-z0-9]/ = checks if has special character

    if      (strength <= 1) { label = 'Weak ';   color = '#cc0000'; }
    else if (strength <= 3) { label = 'Medium '; color = '#e8a000'; }
    else                    { label = 'Strong '; color = '#1a7a3a'; }

    bar.style.width      = (strength * 20) + '%';
    bar.style.background = color;
    text.textContent     = pass.length > 0 ? label : '';
    text.style.color     = color;
});
</script>
{% endblock %}
