<!DOCTYPE html>
<html>
<body>
<div class="container">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>Profile</h2>

    <p>Username: {{ username }}</p>
    <p>Email: {{ email }}</p>
    <p>Role: {{ role }}</p>
   {% if location %}
    <p><strong>Location:</strong> {{ location }}</p>
   {% endif %}

    <a href="/logout">Logout</a>

</div>
</body>
</html>
