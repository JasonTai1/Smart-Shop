<div style="min-height:80vh; display:flex; align-items:center;
            justify-content:center; padding:40px 20px;">
<div style="width:100%; max-width:420px; background:white;
            padding:40px; border-radius:16px;
            box-shadow:0 4px 24px rgba(0,0,0,0.08);">

    {% if session.get('flash') %}
    <div style="color:green; background:#f0fff0; padding:12px;
                border-radius:6px; margin-bottom:15px;
                border:1px solid #99dd99; font-size:14px;">
        {{ session.get('flash') }}
    </div>
    {% set _ = session.pop('flash', None) %}
    {% endif %}

    {% if error %}
    <div style="color:red; background:#fff0f0; padding:12px;
                border-radius:6px; margin-bottom:15px;
                border:1px solid #ffcccc; font-size:14px;">
        ❌ {{ error }}
    </div>
    {% endif %}

    <h2 style="color:#800000; margin-bottom:5px;">Welcome Back!</h2>
    <p style="color:#888; font-size:13px; margin-bottom:25px;">
        Login to your Smart Shop account
    </p>

    <form method="POST">
        <label style="display:block; font-size:13px; color:#555;
                      font-weight:600; margin-bottom:5px;">Email</label>
        <input type="email" name="email" placeholder="your@email.com" required
               style="width:100%; padding:11px 14px; border:1px solid #ddd;
                      border-radius:8px; font-size:14px; margin-bottom:16px;
                      box-sizing:border-box; outline:none;">

        <label style="display:block; font-size:13px; color:#555;
                      font-weight:600; margin-bottom:5px;">Password</label>
        <input type="password" name="password" placeholder="Your password" required
               style="width:100%; padding:11px 14px; border:1px solid #ddd;
                      border-radius:8px; font-size:14px; margin-bottom:20px;
                      box-sizing:border-box; outline:none;">

        <button type="submit"
                style="width:100%; padding:13px; background:#800000;
                       color:white; border:none; border-radius:8px;
                       font-size:15px; font-weight:bold; cursor:pointer;">
            Login
        </button>
    </form>

    <p style="text-align:center; margin-top:12px; font-size:13px;">
       <a href="/forgot_password"
          style="color:#888; text-decoration:none;">
            Forgot password?
       </a>
    </p>

    <p style="text-align:center; margin-top:8px; font-size:13px; color:#777;">
            No account yet?
        <a href="/register" style="color:#800000; font-weight:bold;">
            Register now
        </a>
    </p>
</div>
</div>
